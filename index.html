<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DonateX + Restream Test</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #d8d8d8;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .goal {
      position: absolute;
      top: 24px;
      left: 24px;
      width: calc(100vw - 500px);
      height: 130px;
      z-index: 3;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.08);
    }

    .donations {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .chat {
      position: absolute;
      right: 24px;
      top: 24px;
      width: 420px;
      height: calc(100vh - 48px);
      z-index: 4;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .debug {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      width: min(720px, calc(100vw - 32px));
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font: 13px/1.4 Arial, sans-serif;
    }

    .debug code {
      color: white;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="goal">
      <iframe
        id="goalFrame"
        src="https://donatex.gg/widgets/donation-goal/bdaad423-a4e5-49a0-b238-1ed3daf19b25"
        title="DonateX goal"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="donations">
      <iframe
        id="donationsFrame"
        src="https://donatex.gg/widgets/donations/02341f4c-b126-44c5-aa2e-77188e5907ed"
        title="DonateX donations"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="chat">
      <iframe
        id="chatFrame"
        src="https://chat.restream.io/embed?token=dc435aad-68b1-4e92-89ee-1ae26472f686"
        title="Restream chat"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="debug">
      Тест: <code>DonateX donations</code> + <code>DonateX goal</code> + <code>Restream chat</code>.
      Если DonateX не загрузится, смотри Console: ищем <code>frame-ancestors</code>, <code>403/419</code> или другие ошибки.
    </div>
  </div>

  <script>
    const frames = [
      ["DonateX goal", document.getElementById("goalFrame")],
      ["DonateX donations", document.getElementById("donationsFrame")],
      ["Restream chat", document.getElementById("chatFrame")]
    ];

    frames.forEach(([name, frame]) => {
      frame.addEventListener("load", () => {
        console.log(`${name} iframe load`);
      });

      frame.addEventListener("error", () => {
        console.error(`${name} iframe error`);
      });
    });
  </script>
</body>
</html>
