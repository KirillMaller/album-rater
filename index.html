<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stream Overlay</title>
  <style>
    :root {
      --chat-width: 360px;
      --goal-width: 920px;
      --goal-height: 110px;
      --gap: 18px;
      --safe: 22px;
      --panel-bg: rgba(8, 12, 18, 0.22);
      --panel-border: rgba(255, 255, 255, 0.14);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.68);
      --warning: #ffd36c;
      --danger: #ff8a8a;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Arial, sans-serif;
    }

    body {
      color: var(--text);
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 1280px;
      min-height: 720px;
      background: transparent;
      isolation: isolate;
    }

    .goal-wrap {
      position: absolute;
      top: var(--safe);
      left: 50%;
      width: min(var(--goal-width), calc(100vw - var(--chat-width) - 72px));
      height: var(--goal-height);
      transform: translateX(-50%);
      z-index: 20;
      pointer-events: none;
    }

    .goal-frame,
    .alerts-frame,
    .chat-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .alerts-wrap {
      position: absolute;
      inset: 0;
      z-index: 15;
      pointer-events: none;
    }

    .chat-wrap {
      position: absolute;
      top: calc(var(--safe) + var(--goal-height) + var(--gap));
      right: var(--safe);
      width: min(var(--chat-width), calc(100vw - 2 * var(--safe)));
      height: calc(100vh - var(--safe) * 2 - var(--goal-height) - var(--gap));
      z-index: 10;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.28);
    }

    .status {
      position: absolute;
      left: var(--safe);
      bottom: var(--safe);
      z-index: 30;
      max-width: min(520px, calc(100vw - var(--chat-width) - 80px));
      padding: 10px 14px;
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(7, 10, 15, 0.62);
      backdrop-filter: blur(10px);
      font-size: 13px;
      line-height: 1.35;
    }

    .status strong {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
      color: var(--warning);
    }

    .status.hidden {
      display: none;
    }

    .status.error strong {
      color: var(--danger);
    }

    .status code {
      color: #fff;
      font-size: 12px;
    }

    @media (max-width: 1400px) {
      :root {
        --chat-width: 320px;
        --goal-width: 760px;
        --goal-height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="goal-wrap">
      <iframe
        class="goal-frame"
        src="https://www.donationalerts.com/widget/goal/9599572?token=RoWTR42QpIVrZaIAoBVx"
        title="Donation goal"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="alerts-wrap">
      <iframe
        class="alerts-frame"
        src="https://www.donationalerts.com/widget/alerts?group_id=1&token=RoWTR42QpIVrZaIAoBVx"
        title="Donation alerts"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="chat-wrap">
      <iframe
        class="chat-frame"
        src="https://chat.donationalerts.com/?locale=ru&token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxODU3NTU2IiwiZXhwIjoxNzk3MTg4NzM2fQ.rTONGu305XO38JOQRkf8VJcOMqS9ZHkxNH0P7R9orCE"
        title="DonationAlerts chat"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div id="statusBox" class="status hidden">
      <strong>Что проверить</strong>
      <div id="statusText"></div>
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("statusBox");
    const statusText = document.getElementById("statusText");
    const checks = [];

    function addCheck(message, isError = false) {
      checks.push({ message, isError });
      statusBox.classList.remove("hidden");
      statusBox.classList.toggle("error", checks.some((item) => item.isError));
      statusText.innerHTML = checks.map((item) => item.message).join("<br>");
    }

    function markLoaded(frame, name) {
      let loaded = false;

      frame.addEventListener("load", () => {
        loaded = true;
      });

      window.setTimeout(() => {
        if (!loaded) {
          addCheck(`${name}: не подтвердил загрузку. Проверь URL или блокировку iframe.`, true);
        }
      }, 8000);
    }

    const goalFrame = document.querySelector(".goal-frame");
    const alertsFrame = document.querySelector(".alerts-frame");
    const chatFrame = document.querySelector(".chat-frame");

    markLoaded(goalFrame, "Полоска");
    markLoaded(alertsFrame, "Донаты");
    markLoaded(chatFrame, "Чат");

    if (location.protocol !== "https:" && location.hostname !== "localhost") {
      addCheck("Страницу лучше открывать по <code>https://</code>, иначе некоторые виджеты могут работать нестабильно.", true);
    }

    addCheck("Если на странице пусто, сначала проверь, что GitHub Pages уже обновил <code>index.html</code>.");
  </script>
</body>
</html>
