<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restream + StreamDPS Test</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #d8d8d8;
      font-family: Arial, sans-serif;
    }

    .stage {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .donate {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    .chat {
      position: absolute;
      right: 24px;
      top: 24px;
      width: 420px;
      height: calc(100vh - 48px);
      z-index: 3;
      overflow: hidden;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.2);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
    }

    .debug {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 10;
      width: min(620px, calc(100vw - 32px));
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.72);
      color: white;
      font: 13px/1.4 Arial, sans-serif;
    }

    .debug code {
      color: white;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="donate">
      <iframe
        id="donateFrame"
        src="https://streamdps.ru/widgets/show/?color1=0&hash=710a925695550eb7fa8145541d9a5529b91d859fed4a8500c8a3865d2983710dd30da6bb8df1c777e7d3dd409a7f6eabd5695db2306d017c883f15afa6f4084e&webm=723944&userid=65017&type=DA&min=1&max=1000000&delay=100&channelid=UCk-I3skHX-QRgIczun0fzZw&frame=1"
        title="StreamDPS donate"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="chat">
      <iframe
        id="chatFrame"
        src="https://chat.restream.io/embed?token=dc435aad-68b1-4e92-89ee-1ae26472f686"
        title="Restream chat"
        loading="eager"
        referrerpolicy="strict-origin-when-cross-origin">
      </iframe>
    </div>

    <div class="debug">
      Тест: <code>Restream chat</code> + <code>StreamDPS donate</code>.
      Если донат не загрузится и в консоли будет <code>frame-ancestors</code>, значит StreamDPS блокирует встраивание.
    </div>
  </div>

  <script>
    const donateFrame = document.getElementById("donateFrame");
    const chatFrame = document.getElementById("chatFrame");

    donateFrame.addEventListener("load", () => {
      console.log("StreamDPS donate iframe load");
    });

    chatFrame.addEventListener("load", () => {
      console.log("Restream chat iframe load");
    });
  </script>
</body>
</html>
